<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockBuzzTracker</title>
    <style>
        body { font-family: system-ui; max-width: 900px; margin: 20px auto; padding: 0 15px; background: #f5f5f5; }
        h2 { margin-top: 30px; border-bottom: 2px solid #6200ea; padding-bottom: 5px; }
        .toolbar { display: flex; gap: 10px; margin: 15px 0; }
        button { padding: 10px 16px; background: #6200ea; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #3700b3; }
        #iframeContainer { display: none; width: 100%; height: 80vh; border: 1px solid #ccc; margin: 15px 0; }
        iframe { width: 100%; height: 100%; border: none; }
        table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin: 15px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th { background: #6200ea; color: white; }
        .pos { color: green; font-weight: bold; }
        .neg { color: red; font-weight: bold; }
        .neu { color: gray; }
    </style>
</head>
<body>
    <h1>📈 StockBuzzTracker</h1>
    <div class="toolbar">
        <button onclick="toggleIframe()">🔴 查看 Reddit 原始页面 (meiguhuli.com)</button>
        <button onclick="window.open('https://meiguhuli.com', '_blank')">↗️ 在新窗口打开</button>
    </div>

    <div id="iframeContainer">
        <iframe src="https://meiguhuli.com"></iframe>
    </div>

    <!-- 板块1：纯提及次数排名 -->
    <h2>📈 Reddit 热门提及 Top 25</h2>
    <div id="trendingTableContainer">正在加载...</div>

    <!-- 板块2：情感分析看板 -->
    <h2>🧠 FinBERT 情感分析</h2>
    <div id="sentimentTableContainer">正在加载...</div>

    <!-- Twitter 预留 -->
    <h2>🐦 Twitter 24小时热度榜</h2>
    <p style="color:#888;">数据源暂未接入，敬请期待</p>

    <script>
        function toggleIframe() {
            const c = document.getElementById('iframeContainer');
            c.style.display = (c.style.display === 'none' || c.style.display === '') ? 'block' : 'none';
        }

        // 加载纯提及次数
        async function loadTrending() {
            try {
                const resp = await fetch('http://127.0.0.1:8000/api/reddit-trending');
                const data = await resp.json();
                if (!data.length) {
                    document.getElementById('trendingTableContainer').innerHTML = '<p>暂无数据</p>';
                    return;
                }
                let html = `<table><thead><tr><th>排名</th><th>代码</th><th>提及次数</th></tr></thead><tbody>`;
                data.forEach(item => {
                    html += `<tr><td>${item.rank}</td><td><strong>$${item.ticker}</strong></td><td>${item.mentions}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('trendingTableContainer').innerHTML = html;
            } catch(e) {
                document.getElementById('trendingTableContainer').innerHTML = `<p style="color:red;">加载失败</p>`;
            }
        }

        // 加载情感分析
        async function loadSentiment() {
            try {
                const resp = await fetch('http://127.0.0.1:8000/api/reddit-sentiment');
                const data = await resp.json();
                if (!data.length) {
                    document.getElementById('sentimentTableContainer').innerHTML = '<p>暂无情感数据（分析中...）</p>';
                    return;
                }
                let html = `<table><thead><tr><th>排名</th><th>代码</th><th>分析帖子数</th><th>情感分数</th></tr></thead><tbody>`;
                data.forEach(item => {
                    const sent = item.sentiment;
                    let cls = sent > 0.2 ? 'pos' : (sent < -0.2 ? 'neg' : 'neu');
                    let emoji = sent > 0.2 ? '🟢' : (sent < -0.2 ? '🔴' : '⚪');
                    html += `<tr><td>${item.rank}</td><td><strong>$${item.ticker}</strong></td>
                             <td>${item.mentions}</td><td class="${cls}">${emoji} ${sent.toFixed(3)}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('sentimentTableContainer').innerHTML = html;
            } catch(e) {
                document.getElementById('sentimentTableContainer').innerHTML = `<p style="color:red;">加载失败</p>`;
            }
        }

        // 初始化加载
        loadTrending();
        loadSentiment();

        // 每10分钟刷新一次
        setInterval(() => {
            loadTrending();
            loadSentiment();
        }, 600000);
    </script>
</body>
</html>
